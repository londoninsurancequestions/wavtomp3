<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — WAVtoMP3.io</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/public/auth-pages.css">
</head>
<body>

<nav>
  <div class="wrap nav-in">
    <a href="/" class="brand">
      <span class="logo-mark"><i></i><i></i><i></i><i></i><i></i></span>
      WAVtoMP3<span class="io">.io</span>
    </a>
    <a href="/create-account.html" class="nav-link">Create account</a>
  </div>
</nav>

<main class="wrap panel">
  <div class="eyebrow">Welcome back</div>
  <h1>Log in to your account</h1>
  <p class="lead">Access unlimited conversions, your subscription, and invoice history.</p>

  <div class="card">
    <div class="err" id="error" hidden></div>

    <form id="form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="submitBtn">Log in</button>
    </form>

    <p class="alt">Just subscribed? <a href="/create-account.html">Create your account</a></p>
  </div>
</main>

<script type="module">
import { showError, setLoading } from '/public/auth.js';
import { hasPendingCheckout } from '/public/session-store.js';

const params = new URLSearchParams(window.location.search);
let next = params.get('next') || '/account.html';
const errorEl = document.getElementById('error');
const form = document.getElementById('form');
const submitBtn = document.getElementById('submitBtn');

(async () => {
  const me = await fetch('/api/auth/me', { credentials: 'include' }).then((r) => r.json());
  if (me?.user) window.location.href = next;

  if (next === '/account.html' && (await hasPendingCheckout())) {
    next = '/?restore=1';
  }
})();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  showError(errorEl, '');
  setLoading(submitBtn, true);

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();

    if (!res.ok) {
      showError(errorEl, data.error || 'Login failed');
      setLoading(submitBtn, false, 'Log in');
      return;
    }

    if (next === '/account.html' && (await hasPendingCheckout())) {
      next = '/?restore=1';
    }
    window.location.href = next;
  } catch {
    showError(errorEl, 'Something went wrong. Please try again.');
    setLoading(submitBtn, false, 'Log in');
  }
});
</script>
</body>
</html>
