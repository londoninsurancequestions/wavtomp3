<body>

<nav>
  <div class="wrap nav-in">
    <a href="/" class="brand">
      <span class="logo-mark"><i></i><i></i><i></i><i></i><i></i></span>
      YouConvert<span class="io">.com</span>
    </a>
    <div style="display:flex;gap:22px;align-items:center">
      <a href="/my-files/" class="nav-link">My files</a>
      <a href="/" class="nav-link">Converter</a>
    </div>

</nav>
<div id="freeTierBanner" class="free-tier-banner" hidden>
  <div class="wrap free-tier-banner-in">
    <div class="free-tier-banner-copy">
      <span class="free-tier-banner-eyebrow" id="freeTierBannerEyebrow">Daily free limit reached</span>
      <span class="free-tier-banner-timer" id="freeTierBannerTimer" aria-live="polite">00:00:00</span>
      <span class="free-tier-banner-sub" id="freeTierBannerSub">until your free conversions return</span>
    </div>
    <button type="button" class="free-tier-banner-cta" id="freeTierBannerCta">Unlock Now</button>
  </div>
</div>


<main class="wrap panel wide">
  <div class="top-actions">
    <div>
      <div class="eyebrow">Account</div>
      <h1 id="greeting">Your account</h1>
      <p class="lead" id="emailLine"></p>
    </div>
    <button type="button" class="btn-ghost" id="logoutBtn">Log out</button>
  </div>

  <div class="account-grid">
    <div class="stat-card">
      <h2>Access</h2>
      <div id="subscription">
        <div class="stat-row"><span class="lab">Status</span><span class="val" id="subStatus">—</span></div>
        <div class="stat-row"><span class="lab">Plan</span><span class="val" id="subPlan">—</span></div>
        <div class="stat-row"><span class="lab">Renews</span><span class="val" id="subRenews">—</span></div>
      </div>
      <div id="subActions" class="sub-actions" hidden>
        <p class="sub-notice" id="subNotice" hidden></p>
        <div class="sub-btns">
          <button type="button" class="btn-cancel" id="cancelSubBtn" hidden>Cancel subscription</button>
          <button type="button" class="btn-keep" id="keepSubBtn" hidden>Keep subscription</button>
        </div>
        <p class="sub-err" id="subErr" hidden></p>
      </div>
      <p class="hint" id="subHint" style="margin-top:14px;font-size:12px;color:var(--faint)">Legacy subscriptions can be managed below. New purchases are one-time unlocks.</p>
    </div>

    <div class="stat-card">
      <h2>Password</h2>
      <form id="passwordForm" class="password-form" novalidate>
        <div class="field">
          <label for="currentPassword">Current password</label>
          <input type="password" id="currentPassword" name="currentPassword" autocomplete="current-password" required>
        </div>
        <div class="field">
          <label for="newPassword">New password</label>
          <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm new password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" minlength="8" required>
        </div>
        <p class="err" id="passwordErr" hidden></p>
        <p class="ok" id="passwordOk" hidden></p>
        <button type="submit" class="btn" id="passwordBtn">Update password</button>
      </form>
    </div>
  </div>

  <div class="inv-card" style="margin-top:20px">
    <h2>Invoices</h2>
    <div id="invoices"><p class="empty">Loading invoices…</p></div>
  </div>
</main>

<script type="module">
import {
  requireAuth,
  renderInvoices,
  formatMoney,
  formatDate,
  logout,
} from '/public/auth.js';

const greeting = document.getElementById('greeting');
const emailLine = document.getElementById('emailLine');
const subStatus = document.getElementById('subStatus');
const subPlan = document.getElementById('subPlan');
const subRenews = document.getElementById('subRenews');
const subActions = document.getElementById('subActions');
const subNotice = document.getElementById('subNotice');
const subErr = document.getElementById('subErr');
const cancelSubBtn = document.getElementById('cancelSubBtn');
const keepSubBtn = document.getElementById('keepSubBtn');
const subHint = document.getElementById('subHint');
const invoicesEl = document.getElementById('invoices');

const DEFAULT_SUB_HINT =
  "Cancel anytime — you'll keep access until the end of your billing period.";
const LIFETIME_SUB_HINT = 'You have unlimited conversions on this account.';

function subscriptionStatusLabel(status) {
  switch (status) {
    case 'canceled':
      return 'Canceled';
    case 'past_due':
      return 'Past due';
    case 'unpaid':
      return 'Unpaid';
    case 'incomplete':
      return 'Incomplete';
    case 'incomplete_expired':
      return 'Expired';
    default:
      return 'Inactive';
  }
}

function renderSubscription(sub) {
  subErr.hidden = true;

  if (sub?.active && sub.lifetime) {
    subStatus.innerHTML = '<span class="badge active">Active</span>';
    subPlan.textContent =
      sub.plan + (sub.amount ? ` · ${formatMoney(sub.amount * 100, sub.currency)}` : '');
    subRenews.textContent = 'One-time purchase';
    subActions.hidden = true;
    subNotice.hidden = true;
    subHint.hidden = false;
    subHint.textContent = LIFETIME_SUB_HINT;
    return;
  }

  if (sub?.active) {
    if (sub.cancelAtPeriodEnd) {
      subStatus.innerHTML = '<span class="badge canceling">Canceling</span>';
      subRenews.textContent = sub.currentPeriodEnd
        ? `Access until ${formatDate(sub.currentPeriodEnd)}`
        : '—';
    } else {
      subStatus.innerHTML = '<span class="badge active">Active</span>';
      subRenews.textContent = sub.currentPeriodEnd
        ? formatDate(sub.currentPeriodEnd)
        : '—';
    }
    subPlan.textContent =
      sub.plan + (sub.amount ? ` · ${formatMoney(sub.amount * 100, sub.currency)}` : '');

    subActions.hidden = false;
    if (sub.cancelAtPeriodEnd) {
      subNotice.hidden = false;
      subNotice.innerHTML = sub.currentPeriodEnd
        ? `Your subscription is set to cancel on <b>${formatDate(sub.currentPeriodEnd)}</b>. You'll keep unlimited conversions until then.`
        : 'Your subscription is set to cancel at the end of this billing period.';
      cancelSubBtn.hidden = true;
      keepSubBtn.hidden = false;
      subHint.hidden = true;
    } else {
      subNotice.hidden = true;
      cancelSubBtn.hidden = false;
      keepSubBtn.hidden = true;
      subHint.hidden = false;
      subHint.textContent = DEFAULT_SUB_HINT;
    }
  } else {
    const status = sub?.status || 'inactive';
    const label = subscriptionStatusLabel(status);
    const badgeClass = status === 'past_due' || status === 'unpaid' ? 'canceling' : 'inactive';
    subStatus.innerHTML = `<span class="badge ${badgeClass}">${label}</span>`;

    subPlan.textContent = sub?.plan
      ? sub.plan + (sub.amount ? ` · ${formatMoney(sub.amount * 100, sub.currency)}` : '')
      : '—';

    if (sub?.currentPeriodEnd && status === 'canceled') {
      subRenews.textContent = `Ended ${formatDate(sub.currentPeriodEnd)}`;
    } else if (sub?.currentPeriodEnd && (status === 'past_due' || status === 'unpaid')) {
      subRenews.textContent = `Due ${formatDate(sub.currentPeriodEnd)}`;
    } else {
      subRenews.textContent = '—';
    }

    subActions.hidden = true;
    subHint.hidden = false;
    if (status === 'canceled') {
      subHint.textContent =
        'Your subscription is no longer active. If this looks wrong after a recent payment, log out and back in, or contact support.';
    } else if (status === 'past_due' || status === 'unpaid') {
      subHint.textContent =
        'Your latest renewal payment failed. Update your payment method to restore access.';
    } else {
      subHint.textContent =
        'No active unlock was found for this account. If you recently paid, log out and back in.';
    }
  }
}

cancelSubBtn.addEventListener('click', async () => {
  const renews = subRenews.textContent;
  const ok = confirm(
    `Cancel your subscription?\n\nYou'll keep unlimited access until ${renews === '—' ? 'the end of your billing period' : renews}, and you won't be charged again.`
  );
  if (!ok) return;

  subErr.hidden = true;
  cancelSubBtn.disabled = true;
  cancelSubBtn.textContent = 'Canceling…';

  try {
    const res = await fetch('/api/account/cancel-subscription', {
      method: 'POST',
      credentials: 'include',
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not cancel subscription');
    renderSubscription(data.subscription);
  } catch (err) {
    subErr.textContent = err.message;
    subErr.hidden = false;
  } finally {
    cancelSubBtn.disabled = false;
    cancelSubBtn.textContent = 'Cancel subscription';
  }
});

keepSubBtn.addEventListener('click', async () => {
  subErr.hidden = true;
  keepSubBtn.disabled = true;
  keepSubBtn.textContent = 'Reactivating…';

  try {
    const res = await fetch('/api/account/reactivate-subscription', {
      method: 'POST',
      credentials: 'include',
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not reactivate subscription');
    renderSubscription(data.subscription);
  } catch (err) {
    subErr.textContent = err.message;
    subErr.hidden = false;
  } finally {
    keepSubBtn.disabled = false;
    keepSubBtn.textContent = 'Keep subscription';
  }
});

document.getElementById('logoutBtn').addEventListener('click', logout);

const passwordForm = document.getElementById('passwordForm');
const passwordErr = document.getElementById('passwordErr');
const passwordOk = document.getElementById('passwordOk');
const passwordBtn = document.getElementById('passwordBtn');

passwordForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  passwordErr.hidden = true;
  passwordOk.hidden = true;

  const currentPassword = document.getElementById('currentPassword').value;
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (newPassword.length < 8) {
    passwordErr.textContent = 'Password must be at least 8 characters.';
    passwordErr.hidden = false;
    return;
  }
  if (newPassword !== confirmPassword) {
    passwordErr.textContent = 'New passwords do not match.';
    passwordErr.hidden = false;
    return;
  }

  passwordBtn.disabled = true;
  passwordBtn.textContent = 'Updating…';

  try {
    const res = await fetch('/api/account/password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ currentPassword, newPassword }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not update password');

    passwordForm.reset();
    passwordOk.textContent = 'Password updated successfully.';
    passwordOk.hidden = false;
  } catch (err) {
    passwordErr.textContent = err.message;
    passwordErr.hidden = false;
  } finally {
    passwordBtn.disabled = false;
    passwordBtn.textContent = 'Update password';
  }
});

async function init() {
  const me = await requireAuth();
  if (!me) return;

  greeting.textContent = 'Welcome back';
  emailLine.textContent = me.user.email;

  renderSubscription(me.subscription);

  try {
    const res = await fetch('/api/account/invoices', { credentials: 'include' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    renderInvoices(invoicesEl, data.invoices);
  } catch {
    invoicesEl.innerHTML = '<p class="empty">Could not load invoices. Try again later.</p>';
  }
}

init();
</script>
</body>
</html>
