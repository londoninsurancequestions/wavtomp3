<nav>
  <div class="wrap nav-in">
    <a href="/" class="brand">
      <span class="logo-mark"><i></i><i></i><i></i><i></i><i></i></span>
      YouConvert<span class="io">.com</span>
    </a>
    <div style="display:flex;gap:22px;align-items:center">
      <a href="/account/" class="nav-link">Account</a>
      <a href="/" class="nav-link">Converter</a>
    </div>
  </div>
</nav>
<div id="freeTierBanner" class="free-tier-banner" hidden>
  <div class="wrap free-tier-banner-in">
    <div class="free-tier-banner-copy">
      <span class="free-tier-banner-eyebrow" id="freeTierBannerEyebrow">Daily free limit reached</span>
      <span class="free-tier-banner-timer" id="freeTierBannerTimer" aria-live="polite">00:00:00</span>
      <span class="free-tier-banner-sub" id="freeTierBannerSub">until your free conversions return</span>
    </div>
    <button type="button" class="free-tier-banner-cta" id="freeTierBannerCta">Unlock Now</button>
  </div>
</div>


<main class="wrap panel wide admin-panel" id="app" hidden>
  <div class="top-actions">
    <div>
      <div class="eyebrow">Admin</div>
      <h1>Dashboard</h1>
      <p class="lead">Manage users, subscriptions and conversions.</p>
    </div>
  </div>

  <div class="admin-tabs">
    <button type="button" class="admin-tab active" data-tab="overview">Overview</button>
    <button type="button" class="admin-tab" data-tab="users">Users</button>
    <button type="button" class="admin-tab" data-tab="payments">Payments</button>
  </div>

  <section id="tab-overview" class="admin-section">
    <div class="admin-stats" id="overviewStats"></div>
    <div class="stat-card" style="margin-top:20px">
      <h2>Top conversion routes</h2>
      <div id="formatStats" class="empty">Loading…</div>
    </div>
  </section>

  <section id="tab-users" class="admin-section" hidden>
    <div class="admin-toolbar">
      <input type="search" id="userSearch" placeholder="Search by email…" class="admin-search">
      <button type="button" class="btn-ghost" id="refreshUsers">Refresh</button>
    </div>
    <div class="stat-card">
      <div id="usersTable"></div>
    </div>
    <div id="userDetail" class="stat-card admin-detail" hidden></div>
  </section>

  <section id="tab-payments" class="admin-section" hidden>
    <div class="stat-card">
      <h2>Recent Stripe payments</h2>
      <div id="paymentsTable"></div>
    </div>
  </section>
</main>

<script type="module" src="/public/admin.js"></script>
</body>
