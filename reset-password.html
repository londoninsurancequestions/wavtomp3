<main class="wrap panel">
  <div class="eyebrow">Account recovery</div>
  <h1>Reset your password</h1>
  <p class="lead">Enter the <b>same email you used at checkout</b> and choose a new password. We verify your active subscription — no email is sent.</p>

  <div class="card">
    <div class="err" id="error" hidden></div>

    <form id="form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters">
      </div>
      <div class="field">
        <label for="password2">Confirm new password</label>
        <input type="password" id="password2" name="password2" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn" id="submitBtn">Reset password</button>
    </form>

    <p class="alt">Remember your password? <a href="/login/">Log in</a></p>
  </div>
</main>

<script type="module">
import { showError, setLoading } from '/public/auth.js';

const params = new URLSearchParams(window.location.search);
const emailParam = params.get('email');
const errorEl = document.getElementById('error');
const form = document.getElementById('form');
const emailInput = document.getElementById('email');
const submitBtn = document.getElementById('submitBtn');

if (emailParam) emailInput.value = emailParam;

(async () => {
  const me = await fetch('/api/auth/me', { credentials: 'include' }).then((r) => r.json());
  if (me?.user) window.location.href = '/account/';
})();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  showError(errorEl, '');

  const email = emailInput.value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;

  if (password !== password2) {
    showError(errorEl, 'Passwords do not match.');
    return;
  }

  setLoading(submitBtn, true);

  try {
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (!res.ok) {
      showError(errorEl, data.error || 'Could not reset password');
      if (data.needsRegistration) {
        const alt = document.querySelector('.alt');
        if (alt) {
          alt.innerHTML =
            `Set up your account: <a href="/create-account/?email=${encodeURIComponent(email)}">Create account with your subscription email</a>`;
        }
      }
      setLoading(submitBtn, false, 'Reset password');
      return;
    }

    window.location.href = '/account/';
  } catch {
    showError(errorEl, 'Something went wrong. Please try again.');
    setLoading(submitBtn, false, 'Reset password');
  }
});
</script>
